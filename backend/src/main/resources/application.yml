server:
  port: 8080

spring:
  # ===== 定时任务线程池 =====
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: lottery-scheduled-

  # ===== 默认 SQLite =====
  # 切换 MySQL 只需改下面 datasource 配置即可
  datasource:
    url: jdbc:sqlite:${LOTTERY_DB_PATH:./data/lottery.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10

  # ===== MySQL 配置（取消注释即可切换）=====
  # datasource:
  #   url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:lottery}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  #   username: ${MYSQL_USER:root}
  #   password: ${MYSQL_PASSWORD:}
  #   driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      # SchemaMigrationRunner 已处理建表，不需要 Spring 自动执行 schema.sql
      mode: never
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.lottery: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] %msg%n"

lottery:
  fetch:
    cron: "0 30 22 * * ?"
  cors:
    allowed-origins: "*"
  audit:
    created-by: "system"
    updated-by: "system"
  # ===== JWT 配置 =====
  jwt:
    # 生产环境请通过环境变量设置: LOTTERY_JWT_SECRET
    secret: ${LOTTERY_JWT_SECRET:lottery-java-default-secret-key-change-in-production!!}
    # Access Token 过期时间 (毫秒)，默认 24h
    expiration: ${LOTTERY_JWT_EXPIRATION:86400000}
    # Refresh Token 过期时间 (毫秒)，默认 7天
    refresh-expiration: ${LOTTERY_JWT_REFRESH_EXPIRATION:604800000}
  # ===== 管理员邀请码 =====
  # 注册时填写邀请码直接获得 ADMIN 角色
  # 生产环境请通过环境变量设置: LOTTERY_ADMIN_INVITE_CODE
  auth:
    admin-invite-code: ${LOTTERY_ADMIN_INVITE_CODE:}
